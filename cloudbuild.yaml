steps:
  - name: 'gcr.io/kaniko-project/executor'
    args:
      - --destination=europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/laravel-app:$COMMIT_SHA
      - --cache=true
      - --cache-ttl=24h
      - --dockerfile=Dockerfile

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'finance-service-mbrozman'
      - '--image'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/laravel-app:$COMMIT_SHA'
      - '--region'
      - 'europe-west3'
      - '--port'
      - '8080'
      - '--command'
      - ''
      - '--args'
      - ''

options:
  logging: CLOUD_LOGGING_ONLY